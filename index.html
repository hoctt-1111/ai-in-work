<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI × BrSE/Comtor — Sharing Session</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=6">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <img src="logos/cevc4-logo-white.png" alt="CEVC4" class="brand-logo">
                <div>
                    <div class="brand-title">AI × BrSE</div>
                    <div class="brand-subtitle">CEVC4 Sharing Session</div>
                </div>
            </div>
        </div>
        <ul id="nav-list" class="nav-list">
            <!-- Generated by JS -->
        </ul>
        <div class="sidebar-footer">
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                <span class="theme-icon-light">☀️</span>
                <span class="theme-icon-dark">🌙</span>
            </button>
            <div class="progress-text" id="progress-text">0 / 11</div>
        </div>
    </nav>

    <!-- Mobile Header -->
    <header class="mobile-header">
        <button id="menu-toggle" class="menu-toggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <div class="mobile-title">AI × BrSE/Comtor</div>
        <button id="theme-toggle-mobile" class="theme-toggle" aria-label="Toggle dark mode">
            <span class="theme-icon-light">☀️</span>
            <span class="theme-icon-dark">🌙</span>
        </button>
    </header>

    <!-- Overlay for mobile menu -->
    <div id="overlay" class="overlay"></div>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
        <!-- Progress Bar -->
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <!-- Section Content -->
        <div id="section-content" class="section-content">
            <!-- Rendered by JS -->
        </div>

        <!-- Navigation Buttons -->
        <div class="nav-buttons">
            <button id="btn-prev" class="nav-btn nav-btn-prev" aria-label="Previous section">
                <span class="nav-btn-arrow">←</span>
                <span class="nav-btn-label" id="prev-label">Previous</span>
            </button>
            <button id="btn-next" class="nav-btn nav-btn-next" aria-label="Next section">
                <span class="nav-btn-label" id="next-label">Next</span>
                <span class="nav-btn-arrow">→</span>
            </button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/content.js?v=8"></script>
    <script src="js/app.js?v=8"></script>
</body>
</html>
